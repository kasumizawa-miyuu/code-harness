<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>code-harness</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 24px; margin-bottom: 8px; color: #f0f6fc; }
.subtitle { color: #8b949e; margin-bottom: 32px; }
.status-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.ok { background: #3fb950; }
.status-dot.nok { background: #f85149; }
textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; padding: 16px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 100px; }
textarea:focus { outline: none; border-color: #58a6ff; }
button { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; cursor: pointer; margin-top: 12px; }
button:hover { background: #2ea043; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.output { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-top: 24px; white-space: pre-wrap; font-family: 'JetBrains Mono', 'Cascadia Code', monospace; font-size: 13px; line-height: 1.5; min-height: 100px; display: none; }
.output.show { display: block; }
.output .meta { color: #8b949e; margin-bottom: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.output .meta span { margin-right: 16px; }
.output .meta .success { color: #3fb950; }
.output .meta .fail { color: #f85149; }
</style>
</head>
<body>
<div class="container">
  <h1>code-harness</h1>
  <p class="subtitle">Coding Agent Harness — Web Interface</p>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Checking API key...</span>
  </div>

  <textarea id="taskInput" placeholder="Enter a task for the agent...&#10;&#10;Examples:&#10;  - List all files in the current directory&#10;  - Run npm test and fix any failures&#10;  - Add error handling to all functions"></textarea>
  <br>
  <button id="runBtn" onclick="runTask()">Run Task</button>

  <div class="output" id="output">
    <div class="meta" id="outputMeta"></div>
    <div id="outputContent"></div>
  </div>
</div>

<script>
async function checkStatus() {
  const res = await fetch('/api/status')
  const data = await res.json()
  const dot = document.getElementById('statusDot')
  const text = document.getElementById('statusText')
  if (data.hasKey) {
    dot.className = 'status-dot ok'
    text.textContent = 'API Key configured'
  } else {
    dot.className = 'status-dot nok'
    text.textContent = 'No API Key — run "harness key update" in terminal'
  }
}

async function runTask() {
  const task = document.getElementById('taskInput').value.trim()
  if (!task) return

  const btn = document.getElementById('runBtn')
  const output = document.getElementById('output')
  const meta = document.getElementById('outputMeta')
  const content = document.getElementById('outputContent')

  btn.disabled = true
  btn.textContent = 'Running...'
  output.className = 'output show'
  meta.innerHTML = '<span>Running...</span>'
  content.textContent = ''

  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task }),
    })
    const data = await res.json()

    if (data.status === 'no_key') {
      meta.innerHTML = `<span class="fail">Error</span>`
      content.textContent = data.message
    } else {
      const statusClass = data.success ? 'success' : 'fail'
      meta.innerHTML = `<span class="${statusClass}">${data.status}</span><span>Retries: ${data.retries}</span>`
      content.textContent = data.output || '(no output)'
    }
  } catch (err) {
    meta.innerHTML = `<span class="fail">Error</span>`
    content.textContent = err.message
  }

  btn.disabled = false
  btn.textContent = 'Run Task'
}

checkStatus()
</script>
</body>
</html>
